name: Release SUB Language

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.7-beta)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            compiler_name: sub
            native_name: subc
            asset_name: sub-linux-x86_64
          - os: macos-26
            arch: arm64
            compiler_name: sub
            native_name: subc
            asset_name: sub-macos-arm64
          - os: windows-latest
            arch: x86_64
            compiler_name: sub.exe
            native_name: subc.exe
            asset_name: sub-windows-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build environment (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y gcc make
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install gcc make
          fi

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make
          msystem: MINGW64

      - name: Build compiler + native compiler (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          make clean
          make all
          cp ${{ matrix.compiler_name }} ${{ matrix.asset_name }}
          cp ${{ matrix.native_name }} ${{ matrix.asset_name }}-native

      - name: Build compiler + native compiler (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          make clean
          make all
          cp ${{ matrix.compiler_name }} ${{ matrix.asset_name }}.exe
          cp ${{ matrix.native_name }} ${{ matrix.asset_name }}-native.exe

      - name: Upload compiler artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-compiler
          path: ${{ matrix.asset_name }}${{ runner.os == 'Windows' && '.exe' || '' }}
          retention-days: 5

      - name: Upload native compiler artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-native
          path: ${{ matrix.asset_name }}-native${{ runner.os == 'Windows' && '.exe' || '' }}
          retention-days: 5

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded artifacts
        run: |
          echo "Listing all downloaded artifacts:"
          ls -lR ./artifacts/

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Determine prerelease
        id: prerelease
        run: |
          if [[ "${{ steps.version.outputs.VERSION }}" == *"-beta"* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          {
            echo "## SUB Language ${{ steps.version.outputs.VERSION }}";
            echo "";
            cat docs/RELEASE_NOTES.md;
          } > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: SUB Language ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ steps.prerelease.outputs.PRERELEASE }}
          files: |
            artifacts/sub-linux-x86_64-compiler/*
            artifacts/sub-linux-x86_64-native/*
            artifacts/sub-macos-arm64-compiler/*
            artifacts/sub-macos-arm64-native/*
            artifacts/sub-windows-x86_64-compiler/*
            artifacts/sub-windows-x86_64-native/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "✅ Release ${{ steps.version.outputs.VERSION }} created successfully!"
          echo "📦 Artifacts uploaded for Linux (x86_64), macOS (ARM64), Windows (x86_64)"
          echo "🔗 View release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.VERSION }}"
